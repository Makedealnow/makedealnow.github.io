<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
    background:#f5f5f5;
    color:#333;
}

nav{
    background:#083761;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
    display:inline-block;
}

nav a:hover,
nav a.active{
    text-decoration:underline;
}

header{
    background:linear-gradient(135deg,#0a4d8c,#0d6efd);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.logo{
    width:450px;
    max-width:95%;
    height:auto;
    margin-bottom:25px;
}

section{
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:25px;
}

.button{
    display:inline-block;
    background:#ff9800;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.button:hover{
    opacity:.9;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:30px;
}

footer a{
    color:white;
    text-decoration:none;
    margin:10px;
}

footer a:hover{
    text-decoration:underline;
}

@media(max-width:768px){

    nav a{
        display:block;
        margin:10px 0;
    }

    .logo{
        width:300px;
    }

    .card{
        padding:20px;
    }

}

</style>
